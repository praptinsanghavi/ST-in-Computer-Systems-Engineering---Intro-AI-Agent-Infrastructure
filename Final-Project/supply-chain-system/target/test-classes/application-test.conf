# Test configuration — completely isolated from production JDBC/Postgres setup

akka {
  actor {
    provider = local
  }

  # Use built-in in-memory journal — NO PostgreSQL required for tests
  persistence {
    journal {
      plugin = "akka.persistence.journal.inmem"
      auto-start-journals = []          # ← prevent JDBC journal auto-start
    }
    snapshot-store {
      plugin = "akka.persistence.snapshot-store.local"
      local.dir = "target/test-snapshots"
      auto-start-snapshot-stores = []
    }
  }

  loggers          = ["akka.event.slf4j.Slf4jLogger"]
  loglevel         = "WARNING"
  logging-filter   = "akka.event.slf4j.Slf4jLoggingFilter"
  log-dead-letters = 0
  log-dead-letters-during-shutdown = off
}

supplychain {
  http {
    host = "localhost"
    port = 18080
    ask-timeout-seconds = 5
  }

  llm {
    mode    = "mock"
    api-key = "test-key"
    base-url = "http://localhost"
    model    = "test-model"
    timeout-seconds = 5
    max-retries     = 1
  }

  simulation {
    suppliers  = ["S1", "S2", "S3"]
    warehouses = ["W1", "W2"]
    trucks     = ["T1", "T2", "T3", "T4"]
    stores     = ["ST1", "ST2", "ST3", "ST4", "ST5", "ST6"]
    aggregation-timeout-seconds = 2
  }
}
