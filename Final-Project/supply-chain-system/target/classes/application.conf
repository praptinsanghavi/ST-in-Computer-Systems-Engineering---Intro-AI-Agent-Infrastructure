# ============================================================================
# AKKA CLUSTER CONFIGURATION
# ============================================================================
akka {
  actor {
    provider = cluster

    serialization-bindings {
      "com.supplychain.domain.model.CborSerializable" = jackson-cbor
    }
  }

  # ── Artery Networking ──────────────────────────────────────────────────────
  # canonical.hostname/port = what is advertised to other cluster members
  # bind.hostname            = what socket actually binds to (0.0.0.0 in Docker)
  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?AKKA_HOSTNAME}
      port = 2551
      port = ${?AKKA_PORT}
    }
    bind {
      hostname = "0.0.0.0"
      port = ${akka.remote.artery.canonical.port}
    }
  }

  cluster {
    seed-node-1-host = "127.0.0.1"
    seed-node-1-host = ${?AKKA_SEED_NODE1_HOST}
    seed-node-2-host = "127.0.0.1"
    seed-node-2-host = ${?AKKA_SEED_NODE2_HOST}

    seed-nodes = [
      "akka://SupplyChainSystem@"${akka.cluster.seed-node-1-host}":2551",
      "akka://SupplyChainSystem@"${akka.cluster.seed-node-2-host}":2552"
    ]

    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    # ── Cluster Roles ──────────────────────────────────────────────────────
    # "frontend" nodes: serve HTTP, own the SimulationManagerActor
    # "backend"  nodes: pure Cluster Sharding workers (domain entity hosting)
    # Default: "frontend" — override via AKKA_CLUSTER_ROLE env var
    roles = ["frontend"]
    roles = [${?AKKA_CLUSTER_ROLE}]
  }

  # SLF4J logging
  loggers          = ["akka.event.slf4j.Slf4jLogger"]
  loglevel         = "INFO"
  logging-filter   = "akka.event.slf4j.Slf4jLoggingFilter"
  log-dead-letters = 10
  log-dead-letters-during-shutdown = off

  # ── Akka Persistence ───────────────────────────────────────────────────────
  persistence {
    journal {
      plugin = "jdbc-journal"
      plugin = ${?AKKA_PERSISTENCE_JOURNAL}
    }
    snapshot-store {
      plugin = "jdbc-snapshot-store"
      plugin = ${?AKKA_PERSISTENCE_SNAPSHOT}
    }
  }
}

# ── JDBC Journal (akka-persistence-jdbc 5.0.x) ────────────────────────────
jdbc-journal {
  slick = ${slick}
  circuit-breaker {
    max-failures = 10
    call-timeout = 30s
    reset-timeout = 30s
  }
}

jdbc-snapshot-store {
  slick = ${slick}
  circuit-breaker {
    max-failures = 10
    call-timeout = 30s
    reset-timeout = 30s
  }
}

jdbc-read-journal {
  slick = ${slick}
}

# ── Slick / PostgreSQL connection pool ─────────────────────────────────────
slick {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    host     = "localhost"
    host     = ${?POSTGRES_HOST}
    port     = 5432
    port     = ${?POSTGRES_PORT}
    name     = "supplychain"
    name     = ${?POSTGRES_DB}
    url      = "jdbc:postgresql://"${slick.db.host}":"${slick.db.port}"/"${slick.db.name}"?reWriteBatchedInserts=true"
    user     = "sc_user"
    user     = ${?POSTGRES_USER}
    password = "sc_pass"
    password = ${?POSTGRES_PASSWORD}
    driver   = "org.postgresql.Driver"
    numThreads  = 5
    maxConnections = 5
    minConnections = 1
  }
}

# ============================================================================
# APPLICATION-SPECIFIC CONFIGURATION
# ============================================================================
supplychain {
  system-name = "SupplyChainSystem"


  http {
    host = "0.0.0.0"
    port = 8080
    port = ${?HTTP_PORT}
    ask-timeout-seconds = 120
  }

  llm {
    # ── LLM Mode ────────────────────────────────────────────────────────────
    # "mock"    → deterministic keyword-matching, no network calls (default)
    # "real"    → OpenAI GPT (requires OPENAI_API_KEY)
    # "bedrock" → Amazon Bedrock Converse API (requires AWS credentials below)
    mode = "mock"
    mode = ${?LLM_MODE}

    # ── OpenAI settings (used when LLM_MODE=real) ────────────────────────────
    api-key    = "mock-key"
    api-key    = ${?OPENAI_API_KEY}
    base-url   = "https://api.openai.com/v1"
    model      = "gpt-4o-mini"
    model      = ${?OPENAI_MODEL}

    # ── Amazon Bedrock settings (used when LLM_MODE=bedrock) ─────────────────
    # Set these environment variables to activate Bedrock:
    #   AWS_ACCESS_KEY_ID     → your AWS access key (from IAM console)
    #   AWS_SECRET_ACCESS_KEY → your AWS secret key
    #   AWS_REGION            → region with Bedrock enabled (e.g. us-east-1)
    #   BEDROCK_MODEL_ID      → model ARN or ID, e.g.:
    #     anthropic.claude-3-haiku-20240307-v1:0    (fastest, cheapest)
    #     anthropic.claude-3-sonnet-20240229-v1:0   (balanced)
    #     anthropic.claude-3-5-sonnet-20241022-v2:0 (most capable)
    #     amazon.titan-text-express-v1               (AWS native)
    bedrock-region   = "us-east-1"
    bedrock-region   = ${?AWS_REGION}
    bedrock-model-id = "anthropic.claude-3-haiku-20240307-v1:0"
    bedrock-model-id = ${?BEDROCK_MODEL_ID}

    timeout-seconds = 30
    max-retries     = 3
  }

  simulation {
    # Seed topology
    suppliers  = ["S1", "S2", "S3"]
    warehouses = ["W1", "W2"]
    trucks     = ["T1", "T2", "T3", "T4"]
    stores     = ["ST1", "ST2", "ST3", "ST4", "ST5", "ST6"]

    # Impact aggregation timeout
    aggregation-timeout-seconds = 5
  }
}
